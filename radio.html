<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>radio letter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Serif+Text:ital@0;1&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111110;
    --paper: #16150f;
    --ink: #d4cfc4;
    --ink-dim: #7a776e;
    --gold: #c9a96e;
    --gold-dim: #6b5a3a;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Serif Text', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #radio {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
    transition: opacity 1.2s ease;
  }

  #radio.fade-out { opacity: 0; pointer-events: none; }

  .radio-body {
    background: #1a1508;
    border: 1px solid #3a3020;
    border-radius: 12px;
    padding: 40px 48px;
    width: 380px;
    box-shadow: 0 0 60px #0a0a0880, inset 0 1px 0 #3a3020;
  }

  .radio-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 28px;
    text-align: center;
  }

  .freq-display {
    background: #0c0b06;
    border: 1px solid #2a2518;
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 28px;
    text-align: right;
    position: relative;
    overflow: hidden;
  }

  .freq-display::before {
    content: 'FM';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
  }

  .freq-number {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px #c9a96e60;
  }

  .tuner-track {
    position: relative;
    height: 4px;
    background: #2a2518;
    border-radius: 2px;
    margin-bottom: 10px;
    cursor: pointer;
    user-select: none;
  }

  .tuner-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 2px;
    width: 0%;
  }

  .tuner-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 16px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 12px #c9a96e80;
    cursor: grab;
    left: 0%;
  }

  .tuner-thumb:active { cursor: grabbing; }

  .tuner-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  .lock-hint {
    text-align: center;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.15em;
    height: 18px;
    font-style: italic;
  }

  .lock-hint.found { color: var(--gold); text-shadow: 0 0 12px #c9a96e80; }

  .static-lines { position: absolute; inset: 0; pointer-events: none; }
  .static-lines::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, #ffffff04 2px, #ffffff04 4px);
  }

  #letter-wrap {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 1.4s ease, transform 1.4s ease;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 80px 20px 120px;
  }

  #letter-wrap.visible { opacity: 1; transform: translateY(0); }

  .paper {
    background: var(--paper);
    max-width: 680px;
    width: 100%;
    padding: 72px 72px 80px;
    border: 1px solid #2a2820;
    border-radius: 2px;
    position: relative;
    box-shadow: 0 40px 100px #00000080;
  }

  .paper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(180deg, transparent, transparent 31px, #ffffff03 31px, #ffffff03 32px);
    pointer-events: none;
    border-radius: 2px;
  }

  .paper-date {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .letter-text {
    font-size: 16.5px;
    line-height: 2;
    color: var(--ink);
    white-space: pre-wrap;
    font-family: 'DM Serif Text', Georgia, serif;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--gold);
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  #playlist-btn {
    display: block;
    margin: 64px auto 0;
    padding: 14px 36px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 1s ease, background 0.3s, color 0.3s;
    text-decoration: none;
    text-align: center;
    width: fit-content;
  }

  #playlist-btn.visible { opacity: 1; }
  #playlist-btn:hover { background: var(--gold); color: var(--bg); }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  @media (max-width: 600px) {
    .paper { padding: 40px 32px 56px; }
    .radio-body { width: 320px; padding: 32px; }
  }
</style>
</head>
<body>

<div id="radio">
  <div class="radio-body">
    <div class="radio-brand">Signal — Tune to find</div>
    <div class="freq-display">
      <div class="static-lines"></div>
      <div class="freq-number" id="freq-display">87.5</div>
    </div>
    <div class="tuner-track" id="tuner-track">
      <div class="tuner-fill" id="tuner-fill"></div>
      <div class="tuner-thumb" id="tuner-thumb"></div>
    </div>
    <div class="tuner-labels">
      <span>87.5</span><span>91.0</span><span>94.5</span><span>98.0</span><span>101.5</span>
    </div>
    <div class="lock-hint" id="lock-hint">scanning...</div>
  </div>
</div>

<div id="letter-wrap">
  <div class="paper">
    <!-- change this date to whatever u want -->
    <div class="paper-date">your date here</div>
    <div class="letter-text" id="letter-text"></div>
    <!-- paste your playlist link in the href below -->
    <a id="playlist-btn" href="https://open.spotify.com/playlist/yourplaylistidhere" target="_blank">
      our playlist
    </a>
  </div>
</div>

<!-- put your mp3 file in the same folder and change the src to match the filename -->
<audio id="song" src="your_song.mp3" preload="auto"></audio>
<!-- swap the src with a base64 string if you want it fully self contained -->
<script>
// paste your letter here, keep the backticks
const letter = `Dear [name],

Write your letter here..

— [your name]`;

// change this to whatever frequency you want as the secret
// the number shown on the dial goes from 87.5 to 101.5
// pick something meaningful to you, like a date: 90.3 for march 9, 95.5 for may 5, etc.
const TARGET = 95.5;

// how precise they need to be — 0.05 means they have to land almost exactly on it
// make it bigger like 0.3 if u want it easier to find
const EXACT = 0.05;

// how long to wait before the letter appears (in milliseconds)
// change this to match when ur song gets past its intro
// 3000 = 3 seconds, 5000 = 5 seconds, etc.
const LETTER_DELAY = 3000;

const MIN = 87.5, MAX = 101.5;
const track = document.getElementById('tuner-track');
const thumb = document.getElementById('tuner-thumb');
const fill  = document.getElementById('tuner-fill');
const freqEl = document.getElementById('freq-display');
const hint   = document.getElementById('lock-hint');
const song   = document.getElementById('song');

let dragging = false, locked = false;

let actx = null, staticNode = null, staticGain = null;

function startStatic() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const bufSize = actx.sampleRate * 2;
  const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;

  staticNode = actx.createBufferSource();
  staticNode.buffer = buf;
  staticNode.loop = true;

  const filter = actx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1200;
  filter.Q.value = 0.5;

  staticGain = actx.createGain();
  staticGain.gain.value = 0.15;

  staticNode.connect(filter);
  filter.connect(staticGain);
  staticGain.connect(actx.destination);
  staticNode.start();
}

function fadeOutStatic() {
  if (!staticGain) return;
  staticGain.gain.setTargetAtTime(0, actx.currentTime, 0.3);
  setTimeout(() => { try { staticNode.stop(); } catch(e) {} }, 1200);
}

function toPercent(f) { return ((f - MIN) / (MAX - MIN)) * 100; }
function toFreq(p)    { return MIN + (p / 100) * (MAX - MIN); }

function setFreq(f) {
  f = Math.max(MIN, Math.min(MAX, f));
  const pct = toPercent(f);
  thumb.style.left = pct + '%';
  fill.style.width  = pct + '%';

  startStatic();

  const near = Math.abs(f - TARGET) < EXACT;
  freqEl.textContent = near ? TARGET.toFixed(1) : f.toFixed(1);

  if (staticGain && !locked) {
    const dist = Math.min(Math.abs(f - TARGET) / 3, 1);
    staticGain.gain.setTargetAtTime(0.15 * dist + 0.02, actx.currentTime, 0.05);
  }

  if (near && !locked) {
    hint.textContent = 'signal found ✦';
    hint.classList.add('found');
    freqEl.style.textShadow = '0 0 30px #c9a96eaa';
    locked = true;
    fadeOutStatic();
    setTimeout(startReveal, 900);
  } else if (!locked) {
    hint.textContent = 'scanning...';
    hint.classList.remove('found');
    freqEl.style.textShadow = '0 0 20px #c9a96e60';
  }
}

function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

thumb.addEventListener('mousedown',  e => { if (!locked) { dragging = true; e.preventDefault(); }});
thumb.addEventListener('touchstart', e => { if (!locked) dragging = true; }, { passive: true });

track.addEventListener('click', e => {
  if (locked) return;
  const r = track.getBoundingClientRect();
  setFreq(toFreq(((e.clientX - r.left) / r.width) * 100));
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = track.getBoundingClientRect();
  setFreq(toFreq(((getX(e) - r.left) / r.width) * 100));
});
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  const r = track.getBoundingClientRect();
  setFreq(toFreq(((getX(e) - r.left) / r.width) * 100));
}, { passive: true });

document.addEventListener('mouseup',  () => dragging = false);
document.addEventListener('touchend', () => dragging = false);

function startReveal() {
  document.getElementById('radio').classList.add('fade-out');
  song.volume = 0;
  song.play().catch(() => {});
  let v = 0;
  const up = setInterval(() => {
    v = Math.min(1, v + 0.04);
    song.volume = v;
    if (v >= 1) clearInterval(up);
  }, 80);
  setTimeout(showLetter, LETTER_DELAY);
}

function showLetter() {
  document.getElementById('letter-wrap').classList.add('visible');
  setTimeout(typeLetter, 800);
}

function typeLetter() {
  const el = document.getElementById('letter-text');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  let i = 0;
  function type() {
    if (i < letter.length) {
      cursor.before(document.createTextNode(letter[i]));
      i++;
      setTimeout(type, 28);
    } else {
      cursor.remove();
      setTimeout(() => document.getElementById('playlist-btn').classList.add('visible'), 600);
    }
  }
  type();
}
</script>
</body>
</html>
